<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>codealpha_Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>   

    <h1 class="title"> My Image Gallery </h1>

    <div class="add-container">
        <span id="addImage" class="add-btn">➕</span>
        <input type="file" id="imageInput" accept="image/*" hidden>
    </div>

    <div class="gallery">
        <div class="card"><img src="https://images.unsplash.com/photo-1552053831-71594a27632d?w=600"></div>
        <div class="card"><img src="https://plus.unsplash.com/premium_photo-1694819488591-a43907d1c5cc?w=600"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1510771463146-e89e6e86560e?w=500"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1573865526739-10659fec78a5?w=500"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1592194996308-7b43878e84a6?w=500"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1533738363-b7f9aef128ce?w=735"></div>
    </div>

    <!-- Right Click Menu -->
    <div id="contextMenu" class="context-menu">
        <button id="deleteImage">🗑 Delete</button>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-img" id="lightbox-img">
        <div class="controls">
            <span id="prev" class="btn">⟨</span>
            <span id="next" class="btn">⟩</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
