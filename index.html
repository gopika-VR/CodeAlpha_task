<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Projects</title>

    <style>
        body{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container{
            background: rgba(255,255,255,0.15);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 300px;
        }

        h1{
            margin-bottom: 25px;
        }

        a{
            display: block;
            text-decoration: none;
            background: #fff;
            color: #333;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover{
            background: #ffd166;
            transform: scale(1.05);
        }

        footer{
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CodeAlpha Projects</h1>

        <!-- Calculator Link -->
        <a href="calculator/index.html">🧮 Calculator</a>

        <!-- Image Gallery Link -->
        <a href="image-gallery/index.html">🖼 Image Gallery</a>

        <footer>
            Developed by Gopika VR
        </footer>
    </div>

</body>
</html>
